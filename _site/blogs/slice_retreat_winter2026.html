<body>
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>

    <div class="container">
        <header>
    <div class="logo-group">
        <a href="/" class="logo">Sidharth Sharma</a>
        <span id="name-heptapod" class="name-heptapod"></span>
    </div>
    <nav>
        <a href="/">Home</a>
        <a href="/blog.html">Blog</a>
        <a href="#">Pictures</a>
        <button id="theme-toggle"></button>
    </nav>
</header>


        <main>
            <article>
                <h1 class="post-title-large">SLICE Research Retreat Winter 2026</h1>
                <div class="post-meta">January 16, 2026 · ? min read</div>
                
                <div class="tags">
                    
                    <span class="tag">CS</span>
                    
                </div>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--accent-color); opacity: 0.3;">

                <div class="code-callout">
    <span><strong>Coauthors:</strong> This blog post was written with Justin Yang.</span>
</div>

                SLICE Retreat was fun.


                <div class="heptapod-signature" style="text-align:center; margin:12px 0 0 0; padding-top:10px; opacity: 0.8;">
                    <div id="post-heptapod"></div>
                    <div class="post-meta" style="margin-top: 4px; font-size: 0.8em;">signed</div>
                </div>
            </article>

        <footer>
    &copy; 2026 Sidharth Sharma.
</footer>

    </div>

    <script src="/heptapod.js"></script>
    <script src="/script.js"></script>
    <script>
        // Generate heptapod signature from post content
        (async function() {
            const article = document.querySelector('article');
            // Get text content excluding the heptapod signature itself
            const sigDiv = document.querySelector('.heptapod-signature');
            if (sigDiv) sigDiv.style.display = 'none';
            const text = article ? article.textContent.trim() : '';
            if (sigDiv) sigDiv.style.display = '';
            
            const hash = await hashText(text);
            const container = document.getElementById('post-heptapod');
            if (container) {
                container.innerHTML = heptapodCircle(hash, 200);
            }
        })();
    </script>
</body>
