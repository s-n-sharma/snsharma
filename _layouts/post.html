<!DOCTYPE html>
<html lang="en">
<head>
    {% include head.html %}
</head>
<body>
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>

    <div class="container">
        {% include header.html %}

        <main>
            <article>
                <h1 class="post-title-large">{{ page.title }}{% if page.github_url %}
                    <a href="{{ page.github_url }}" class="title-icon" target="_blank" aria-label="View on GitHub">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                        </svg>
                    </a>
                {% endif %}</h1>
                <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.read_time %} · {{ page.read_time }}{% endif %}</div>
                
                <div class="tags">
                    {% for tag in page.tags %}
                    <span class="tag">{{ tag }}</span>
                    {% endfor %}
                </div>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--accent-color); opacity: 0.3;">

                {{ content }}

                <div class="heptapod-signature" style="text-align:center; margin:12px 0 0 0; padding-top:10px; opacity: 0.8;">
                    <div id="post-heptapod"></div>
                    <div class="post-meta" style="margin-top: 4px; font-size: 0.8em;">signed</div>
                </div>
            </article>
        </main>

        {% include footer.html %}
    </div>

    <script src="{{ '/heptapod.js' | relative_url }}"></script>
    <script src="{{ '/script.js' | relative_url }}"></script>
    <script>
        // Generate heptapod signature from post content
        (async function() {
            const article = document.querySelector('article');
            // Get text content excluding the heptapod signature itself
            const sigDiv = document.querySelector('.heptapod-signature');
            if (sigDiv) sigDiv.style.display = 'none';
            const text = article ? article.textContent.trim() : '';
            if (sigDiv) sigDiv.style.display = '';
            
            const hash = await hashText(text);
            const container = document.getElementById('post-heptapod');
            if (container) {
                container.innerHTML = heptapodCircle(hash, 200);
            }
        })();
    </script>
</body>
</html>
