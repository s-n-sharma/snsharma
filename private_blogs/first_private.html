    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        
        const ENCRYPTED_DATA = "U2FsdGVkX1+CSy+6CP4eXll2QTIs40QX8DAsUkLwj01CTMSzMYnSDRD+DDZ+Cn+EhFzqtLDsG9e5rT1XHqu16SQKSUn88Yn32y60D61fAAE/dXpTaQl9zno4/ewJJVRMJF0oM6zWUddX61XSDNwqkbY/U0dH9zN3zpnqyTbidRHC+zQBC+sN+V3+sue5iKnq9hONFqDbBTQUW968pkw5+k/GmL6m1Syn7VBWHSVD0R6MX1XGqg4J46iknRh1weZAQGO2LrdLZuVD4C+jDDRlFHoBKm1TvdDlyNlH1wdyBCwg2SDd6GmrlysKqLO/cidGmsb2L7/EZqysU+oXb7CcKP+BIHiVVrvPb9PA0MhiY7WyuG9zA+ukScJo3BiIU4uV1RFF4EsByyZHyZ78SrIvgKaeO0I5L4O8XJgFWAmc/WuTe+HWNhuM/+8R9uMbVSp6NJDGYlgJ/KG/Lv1fgK1Xs/C07pz3oWpkNJeWPdSDGcBC7vXGt3zFTZkPz1RNMDPvR8YjrxIRDh1yqaqk9lrMViIG1P9go+9oHjKQrSQ82TN45eocO9cHECuFyrTYkA83TNoHsMqvcE/PU92b8eF6C41djW22Jzvpm+dc9iwG3xdNg/p2UU+nUYLtAwlq6zyrJJTcSX3UfmGJYVQr9LXPIbCPFyx3/y9A+d13ODhs0AyJ6FciblRTGJSNn6zbvAV8YKz4hkjbfwX7V4qp5+oK8Q=="
        const STORAGE_KEY = "my_vault_key_hash";

        // ==========================================
        // LOGIC
        // ==========================================

        window.addEventListener('load', function() {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey && ENCRYPTED_DATA) {
                attemptDecrypt(savedKey);
            }
        });

        function processUpload() {
            const fileInput = document.getElementById('key-file-input');
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file first!");
                return;
            }
            
            if (!ENCRYPTED_DATA) {
                alert("Error: You haven't put an encrypted string in the code yet!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const binaryString = e.target.result;
                const keyHash = CryptoJS.SHA256(CryptoJS.enc.Latin1.parse(binaryString)).toString();
                attemptDecrypt(keyHash);
            };
            reader.readAsBinaryString(file);
        }

        function attemptDecrypt(key) {
            try {
                // decryptedBytes will be empty if the key is wrong
                const decryptedBytes = CryptoJS.AES.decrypt(ENCRYPTED_DATA, key);
                const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);

                if (decryptedText) {
                    // SUCCESS: Hide login, show vault
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("error-msg").style.display = "none";
                    
                    const vault = document.getElementById("vault-content");
                    vault.style.display = "block";
                    
                    // Inject the decrypted HTML + a lock button
                    const lockIconSVG = '<svg class="vault-icon" viewBox="0 0 24 24" style="width:16px; height:16px; stroke: currentColor; fill: none; stroke-width:2;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>';

                    vault.innerHTML = decryptedText + '<br><br><button onclick="lockVault()" class="vault-btn" id="lock-btn">' + lockIconSVG + ' Lock </button>';                    
                    localStorage.setItem(STORAGE_KEY, key);
                } else {
                    showError();
                }
            } catch (e) {
                showError();
            }
        }

        function showError() {
            const errorMsg = document.getElementById("error-msg");
            errorMsg.style.display = "flex"; // Changed from 'block' to 'flex' for alignment
            
            // Clear storage if it was wrong
            localStorage.removeItem(STORAGE_KEY);
        }

        function lockVault() {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    </script>
