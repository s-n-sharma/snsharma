    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        
        // PASTE YOUR GENERATED STRING BETWEEN THE QUOTES BELOW.
        // It should look like "U2FsdGVk..." 
        // Do not use the one from my previous message, it was just an example!
        const ENCRYPTED_DATA = "U2FsdGVkX1/5NLE5rxM+YIaVXo0/3feJt4f/T7JrdlsHe4aebsjss9+Ubx6cQiCNyUfJUhldbDx22VoOpCGzgCGOwp+FM+FZiADCtwheSUS4nohtRSgxA8+cLEqq4HYjbG+UGcODMECj5OgcrFhtRC/1SWHWzKdi7O+RAYtBoumT9iaFf3j3sFkjNhXAfMxcCIcyAQzLPiHrRgktenohPepAQYXmm+Tt8v0s1uPB1WPlmaTgs6yQzo+uqPitBEGB0t67Sjo5MwoIUUdAU5qNMqUpFBnGRKb02bL2dcrd+zwvmZvDd7e3VSbNAp4abCEAznyOpW0A3rmFVu2wDl3grEuaEGL8Yhcib8TsMLYvUKAvbjUr9Svlrw5dru7Z2z/Bh/GXT5P1xe3w1HPnISfWyfBEqr8lBCSDDLrA0T1i21XlmJ3oQVg2lGa2f8KhHQFiZrBuu5Iqe5edJq2IZqBBbz5mBM2i/J2LFWc1It4kxfbTB/o7NGvkETJzJxk3B3q9GMfvtHn/TJoTTHqfbS20u/tDf1W8leRp29Y/a3aFY9o40aUuAkUPukorkeJWw69NKitypWREyg3+JthcQuvVXIfY7Vv1y5/44ew8vvju7rIk/xZnJxD2na9R1WWrH6XFEwnAIw1SP5aOl+gcAbygvg=="; 
        
        const STORAGE_KEY = "my_vault_key_hash";

        // ==========================================
        // LOGIC
        // ==========================================

        window.addEventListener('load', function() {
            const savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey && ENCRYPTED_DATA) {
                attemptDecrypt(savedKey);
            }
        });

        function processUpload() {
            const fileInput = document.getElementById('key-file-input');
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file first!");
                return;
            }
            
            if (!ENCRYPTED_DATA) {
                alert("Error: You haven't put an encrypted string in the code yet!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const binaryString = e.target.result;
                const keyHash = CryptoJS.SHA256(CryptoJS.enc.Latin1.parse(binaryString)).toString();
                attemptDecrypt(keyHash);
            };
            reader.readAsBinaryString(file);
        }

        function attemptDecrypt(key) {
            try {
                // decryptedBytes will be empty if the key is wrong
                const decryptedBytes = CryptoJS.AES.decrypt(ENCRYPTED_DATA, key);
                const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);

                if (decryptedText) {
                    // SUCCESS: Hide login, show vault
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("error-msg").style.display = "none";
                    
                    const vault = document.getElementById("vault-content");
                    vault.style.display = "block";
                    
                    // Inject the decrypted HTML + a lock button
                    // This defines the SVG icon code as a string so we can reuse it cleanly
                    const lockIconSVG = '<svg class="vault-icon" viewBox="0 0 24 24" style="width:16px; height:16px; stroke-width:2;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>';

                    vault.innerHTML = decryptedText + '<br><br><button onclick="lockVault()" class="vault-btn" id="lock-btn">' + lockIconSVG + ' Lock </button>';                    localStorage.setItem(STORAGE_KEY, key);
                    } else {
                    showError();
                }
            } catch (e) {
                showError();
            }
        }

        function showError() {
            const errorMsg = document.getElementById("error-msg");
            errorMsg.style.display = "flex"; // Changed from 'block' to 'flex' for alignment
            
            // Clear storage if it was wrong
            localStorage.removeItem(STORAGE_KEY);
        }

        function lockVault() {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    </script>
